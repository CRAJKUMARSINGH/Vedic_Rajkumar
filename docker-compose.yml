version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: gochar-phal:latest
    container_name: gochar-phal
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gochar.rule=Host(`gochar.yourdomain.com`)"
      - "traefik.http.routers.gochar.entrypoints=websecure"
      - "traefik.http.routers.gochar.tls.certresolver=letsencrypt"

  # Optional: Traefik reverse proxy with auto-HTTPS
  # Uncomment to enable in production
  # traefik:
